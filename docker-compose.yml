version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=tcarp_user
      - POSTGRES_PASSWORD=tcarp_pass
      - POSTGRES_DB=tcarp
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY} 
    depends_on:
      - redis
      - postgres
    networks:
      - tcarp-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - tcarp-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tcarp-network

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tcarp
      POSTGRES_USER: tcarp_user
      POSTGRES_PASSWORD: tcarp_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tcarp-network

volumes:
  redis_data:
  postgres_data:

networks:
  tcarp-network: